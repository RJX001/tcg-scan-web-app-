[project]
name = "tcgscan-agents"
version = "0.0.0"
description = "LangGraph agents for TCG Scan"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.4.8",
    "langchain-anthropic>=0.3.14",
    "pydantic>=2.11.5",
    "structlog>=25.4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.5", "pytest-asyncio>=0.26.0", "ruff>=0.11.12", "mypy>=1.15.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tcgscan_agents"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
