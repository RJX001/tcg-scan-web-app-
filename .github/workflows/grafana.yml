name: Grafana Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/grafana/**"
      - ".github/workflows/grafana.yml"
  pull_request:
    paths:
      - "infra/grafana/**"
      - ".github/workflows/grafana.yml"

concurrency:
  group: grafana-terraform
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_grafana_url: ${{ secrets.GRAFANA_URL }}
  TF_VAR_grafana_auth: ${{ secrets.GRAFANA_AUTH }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/grafana
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Restore Terraform state
        id: tfstate
        uses: actions/cache/restore@v4
        with:
          path: |
            infra/grafana/terraform.tfstate
            infra/grafana/terraform.tfstate.backup
          key: grafana-tfstate-v1
          restore-keys: |
            grafana-tfstate-

      - name: Terraform Init
        run: terraform init -input=false

      - name: Bootstrap import (missing resources only)
        # Existing Cloud resources (folder, API overview dashboard, tcgscan-api
        # rule group) must be imported before create. Contact point "telegram"
        # is intentionally NOT managed — never import/create/destroy it.
        run: |
          set -euo pipefail
          state="$(terraform state list 2>/dev/null || true)"
          if ! grep -qx 'grafana_folder.tcgscan' <<<"$state"; then
            terraform import -input=false grafana_folder.tcgscan tcgscan
          fi
          if ! grep -qx 'grafana_dashboard.this["api-overview.json"]' <<<"$state"; then
            terraform import -input=false 'grafana_dashboard.this["api-overview.json"]' tcgscan-api-overview
          fi
          if ! grep -qx 'grafana_rule_group.api' <<<"$state"; then
            terraform import -input=false grafana_rule_group.api 'tcgscan:tcgscan-api'
          fi

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set -euo pipefail
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt

      - name: Post Plan to GitHub PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/grafana/plan.txt', 'utf8');
            const body = [
              '#### Grafana Terraform Plan',
              '',
              '```',
              plan.slice(0, 60000),
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '#### Grafana Terraform Plan';
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Persist Terraform state
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: |
            infra/grafana/terraform.tfstate
            infra/grafana/terraform.tfstate.backup
          key: grafana-tfstate-v1-${{ github.run_id }}
