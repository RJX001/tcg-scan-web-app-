name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm schema:build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run ruff check apps/api apps/worker apps/ml packages/agents packages/sdk-py
      - run: uv run --directory apps/api mypy tcgscan_api
      - run: uv run --directory apps/worker mypy tcgscan_worker
      - run: uv run --directory apps/ml mypy tcgscan_ml
      - run: uv run --directory packages/agents mypy tcgscan_agents
      - run: uv run pytest apps/api/tests apps/worker/tests apps/ml/tests packages/agents/tests packages/sdk-py/tests
